<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>BATUHAN MINING - PRO V8.0</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 10px; }
        .ticker { background: #111; color: #ff0; padding: 5px; font-size: 14px; overflow: hidden; border: 1px solid #333; margin-bottom: 10px; }
        .wallet { border: 2px solid #0f0; padding: 20px; text-align: center; font-size: 24px; margin-bottom: 20px; box-shadow: 0 0 20px #0f0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .box { border: 1px solid #333; padding: 10px; background: #050505; }
        .btn { background: #222; color: #fff; border: 1px solid #444; padding: 10px; margin-top: 5px; cursor: pointer; width: 100%; }
        .btn:hover { background: #444; }
    </style>
</head>
<body>
    <div class="ticker" id="ticker">PİYASA DURUMU: ANALİZ EDİLİYOR...</div>
    <div class="wallet">TOPLAM KAZANÇ: <span id="total-money">0.00</span> TL</div>
    
    <div class="grid">
        <div class="box">BTC RIG: <span id="hash-btc">0</span> TH/s</div>
        <div class="box">ETH RIG: <span id="hash-eth">0</span> GH/s</div>
    </div>

    <div style="margin-top: 20px;">
        <button class="btn" onclick="crashMarket()">MARKETİ ÇÖKERT (DÜŞÜR)</button>
        <button class="btn" onclick="pumpMarket()">BOĞA PİYASASI (UÇUR)</button>
        <button class="btn" onclick="resetWallet()" style="color:red;">KASAYI SIFIRLA</button>
    </div>

    <script>
        let totalMoney = parseFloat(localStorage.getItem('batuhan_wallet')) || 0;
        
        function updateDisplay() {
            document.getElementById('total-money').innerText = totalMoney.toLocaleString('tr-TR', {minimumFractionDigits: 2});
            localStorage.setItem('batuhan_wallet', totalMoney);
        }

        function crashMarket() { 
            totalMoney *= 0.5; 
            document.getElementById('ticker').innerText = "KRİTİK UYARI: PİYASALAR ÇÖKÜYOR, BAKİYELER ERİDİ!";
            updateDisplay(); 
        }

        function pumpMarket() { 
            totalMoney += 50000; 
            document.getElementById('ticker').innerText = "BOĞA PİYASASI BAŞLADI: YATIRIMCILAR ZENGİNLEŞTİ!";
            updateDisplay(); 
        }

        function resetWallet() { totalMoney = 0; updateDisplay(); }

        setInterval(() => {
            // Gerçekçi değişkenlik: Bazen artar, bazen düşer
            let delta = (Math.random() * 200) - 50; 
            totalMoney += delta;
            if(totalMoney < 0) totalMoney = 0;
            updateDisplay();
        }, 1000);
    </script>
</body>
</html>
